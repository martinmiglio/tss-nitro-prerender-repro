name: Repro

on:
  push:
  workflow_dispatch:

# Each job runs `bun run build` with a different nitro preset.
# A red job = the bug reproduces (build errors out or hangs past the timeout).
# A green job = the build completes normally.
# When TanStack/nitro ship a fix, the red jobs flip to green.
jobs:
  matrix:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: default (node-server)
            preset: ''
          - label: node-server
            preset: node-server
          - label: aws-lambda
            preset: aws-lambda
          - label: vercel
            preset: vercel
          - label: netlify
            preset: netlify
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Print versions
        run: |
          bun pm ls | grep -E 'tanstack|nitro|vite|@vitejs' || true
          node --version
          bun --version

      - name: Build (preset=${{ matrix.label }})
        env:
          NITRO_PRESET: ${{ matrix.preset }}
        timeout-minutes: 2
        run: bun run build 2>&1 | tee build.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-${{ matrix.preset || 'default' }}
          path: build.log
